version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cfi_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-db_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-db_password}
      POSTGRES_DB: ${DB_NAME:-db_name}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-db_user} -d ${DB_NAME:-db_name}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cfi_network
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    container_name: cfi_qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-change-me}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cfi_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cfi_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-db_user}:${DB_PASSWORD:-db_password}@db:5432/${DB_NAME:-db_name}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      FASTAPI_ENV: ${FASTAPI_ENV:-development}
      DEBUG: ${DEBUG:-True}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - cfi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # N8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: cfi_n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: ${DB_USER:-db_user}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-db_password}
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me_123}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_WEBHOOK_TUNNEL_URL: ${N8N_WEBHOOK_TUNNEL_URL:-http://localhost:5678/}
      NODE_ENV: ${FASTAPI_ENV:-development}
      WEBHOOK_TUNNEL_URL: ${N8N_WEBHOOK_TUNNEL_URL:-http://localhost:5678/}
      WEBHOOK_URL: ${WEBHOOK_URL:-your-webhook-url}
      N8N_ALLOW_ENV_ACCESS: 'true'
    ports:
      - "5678:5678"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n_workflows:/workflows
    networks:
      - cfi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: cfi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - cfi_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# Networks
networks:
  cfi_network:
    driver: bridge

# Volumes
volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  n8n_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local